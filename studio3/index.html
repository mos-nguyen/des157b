<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Library Liberty: Space DressUp!</title>

    <link href="https://cdnjs.cloudflare.com/ajax/libs/normalize/8.0.1/normalize.min.css" rel="stylesheet">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="styles.css" rel="stylesheet">

    <script 
        src="https://code.jquery.com/jquery-4.0.0.min.js"
        integrity="sha256-OaVG6prZf4v69dPg6PhVattBXkcOWQB62pdZ3ORyrao=" 
        crossorigin="anonymous" defer>
    </script>

    <script 
        src="https://code.jquery.com/ui/1.14.2/jquery-ui.min.js" 
        integrity="sha256-mblSWfbYzaq/f+4akyMhE6XELCou4jbkgPv+JQPER2M=" crossorigin="anonymous" defer>
    </script>

    <script src="script.js" defer></script>
</head>

<body>

    <header>
        <h1>SPACE FASHION</h1>
    </header>

    <a href="/index.html">Home</a>

    <div id="drop-zone">
        <img src="images/Alien.svg" id="alien" alt="alien to dress up">
    </div>

    <div id="hat-zone">
        <img src="images/Headband.svg" id="headband" alt="headband asset for pink outfit">
        <img src="images/Green-hat.svg" id="green-hat" alt="hat for green outfit">
        <img src="images/Bow.svg" id="bow" alt="bow">
    </div>

    <div id="misc-zone">
        <!-- <img src="images/" id="pink-misc" alt="arm accesories for pink outfit"> -->
        <img src="images/Green-misc.svg" id="green-misc" alt="accesories for green outfit">
        <img src="images/Purple-misc.svg" id="purple-misc" alt="accesories for purple outfit">
    </div>

    <div id="boots-zone">
        <img src="images/Pink-boots.svg" id="pink-boots" alt="boots for pink outfit">
        <img src="images/Green-boots.svg" id="green-boots" alt="boots for green outfit">
        <img src="images/Purple-boots.svg" id="purple-boots" alt="boots for purple outfit">
    </div>

    <div id="main-zone">
        <img src="images/Pink-main.svg" id="pink-main" alt="main dress part for pink outfit">
        <img src="images/Green-main.svg" id="green-main" alt="main dress part for green outfit">
        <img src="images/Purple-main.svg" id="purple-main" alt="main dress for purple outfit">
    </div>

    
    
    
    

    
    
    
    

    
    
    



    <footer>
        <p>Libraries used: Interact and Granim</p>
    </footer>
</body>

</html>
